name: Qt release gates

on:
  push:
    branches:
      - main
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "src/**"
      - "qml/**"
      - "tests/**"
      - "scripts/**"
      - "packaging/**"
      - "assets/**"
      - "installer/**"
      - "LICENSE"
      - "THIRD_PARTY_NOTICES.txt"
      - "VERSION"
      - ".github/workflows/release.yml"
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "src/**"
      - "qml/**"
      - "tests/**"
      - "scripts/**"
      - "packaging/**"
      - "assets/**"
      - "installer/**"
      - "LICENSE"
      - "THIRD_PARTY_NOTICES.txt"
      - "VERSION"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: qt-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-release:
    name: Windows build, portable, and MSI
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: "6.8.3"
          arch: win64_msvc2022_64
          cache: true
          source: true
          src-archives: qtbase qtdeclarative
      - name: Configure and test Release
        shell: pwsh
        run: |
          cmake --preset release
          cmake --build --preset release
          ctest --preset release --output-on-failure
      - name: Create 10,000-image performance fixture
        timeout-minutes: 5
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP "piclens-10000"
          New-Item -ItemType Directory -Path $fixture -Force | Out-Null
          $source = Resolve-Path "assets/Square150x150Logo.scale-200.png"
          $timer = [Diagnostics.Stopwatch]::StartNew()
          1..10000 | ForEach-Object {
            Copy-Item -LiteralPath $source -Destination (Join-Path $fixture ("image-{0:D5}.png" -f $_))
            if ($_ % 1000 -eq 0) {
              Write-Host "Fixture progress: $_/10000 ($([math]::Round($timer.Elapsed.TotalSeconds, 1))s)"
            }
          }
          $files = Get-ChildItem -LiteralPath $fixture -File
          if ($files.Count -ne 10000) { throw "Fixture count mismatch: $($files.Count)" }
          Write-Host "Fixture ready in $([math]::Round($timer.Elapsed.TotalSeconds, 1))s"
      - name: Measure 10,000-image Release fixture
        timeout-minutes: 10
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP "piclens-10000"
          if (-not (Test-Path -LiteralPath $fixture)) { throw "Performance fixture is missing" }
          pwsh -NoProfile -File scripts/measure-performance.ps1 -FolderPath $fixture
      - name: Build sanitized portable bundle
        shell: pwsh
        run: pwsh -NoProfile -File scripts/build-portable.ps1
      - name: Build and audit MSI
        shell: pwsh
        run: pwsh -NoProfile -File scripts/build-msi.ps1 -NoRelease
      - name: Prepare same-version migration replacement fixture
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/installer-lifecycle -Force | Out-Null
          Copy-Item artifacts/installer/PicLens-win-x64.msi artifacts/installer-lifecycle/PicLens-previous-build.msi
          pwsh -NoProfile -File scripts/build-msi.ps1 -NoRelease
      - name: Install, upgrade, launch, and uninstall MSI
        timeout-minutes: 25
        shell: pwsh
        run: >-
          pwsh -NoProfile -File scripts/test-msi-lifecycle.ps1
          -PreviousMsiPath artifacts/installer-lifecycle/PicLens-previous-build.msi
          -ConfirmSystemChanges
      - name: Upload Windows lifecycle diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: PicLens-Windows-lifecycle-diagnostics
          if-no-files-found: warn
          path: artifacts/installer-lifecycle/**
      - name: Upload Windows release candidates
        uses: actions/upload-artifact@v4
        with:
          name: PicLens-Qt-Windows
          if-no-files-found: error
          path: |
            artifacts/qt-portable/PicLens-win-x64/**
            artifacts/installer/PicLens-win-x64.msi
            artifacts/performance/windows-release.json

  linux-release:
    name: Linux build, desktop adapters, and portable
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install desktop smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            ninja-build xvfb dbus-x11 xdg-utils libglib2.0-bin pcmanfm libxcb-cursor0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: "6.8.3"
          cache: true
          source: true
          src-archives: qtbase qtdeclarative
      - name: Build, test, deploy, and run sanitized smoke
        run: xvfb-run -a bash scripts/build-linux-portable.sh
      - name: Exercise gio trash and xdg-open adapters
        run: xvfb-run -a dbus-run-session -- build/release/bin/piclens_platform_file_manager_smoke
      - name: Build Debian candidate
        run: |
          cmake -S . -B build/release -DPICLENS_SYSTEM_PACKAGE=ON
          cpack -G DEB --config build/release/CPackConfig.cmake -B build/release
          mkdir -p artifacts/installer
          cp build/release/*.deb artifacts/installer/
          dpkg-deb --fsys-tarfile artifacts/installer/*.deb | tar -tf - | grep -Fx './opt/piclens/bin/PicLens'
      - name: Install, launch, and remove Debian package
        run: >-
          xvfb-run -a bash scripts/test-linux-package-lifecycle.sh
          --deb build/release/*.deb
          --expected-executable artifacts/qt-portable/PicLens-linux-x64/bin/PicLens
      - name: Upload Linux portable candidate
        uses: actions/upload-artifact@v4
        with:
          name: PicLens-Qt-Linux
          if-no-files-found: error
          path: |
            artifacts/qt-portable/PicLens-linux-x64/**
            artifacts/installer/*.deb

  fedora-release:
    name: Fedora RPM build and lifecycle
    runs-on: ubuntu-24.04
    container: fedora:44
    timeout-minutes: 45
    steps:
      - name: Install Fedora Qt and build dependencies
        run: >-
          dnf install --assumeyes
          git gcc-c++ cmake ninja-build rpm-build
          qt6-qtbase-devel qt6-qtdeclarative-devel
      - uses: actions/checkout@v4
      - name: Configure, build, and test against Fedora system Qt
        run: |
          cmake -S . -B build/fedora -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICLENS_SYSTEM_PACKAGE=ON \
            -DPICLENS_USE_SYSTEM_QT=ON
          cmake --build build/fedora
          ctest --test-dir build/fedora --output-on-failure
      - name: Build and inspect RPM
        working-directory: build/fedora
        run: |
          cpack -G RPM
          rpm --query --package --requires ./*.rpm
          rpm --query --package --list ./*.rpm
          rpm --query --package --list ./*.rpm | grep -Fx '/opt/piclens/bin/PicLens'
      - name: Install, launch, and remove RPM
        run: >-
          bash scripts/test-linux-package-lifecycle.sh
          --rpm build/fedora/*.rpm
      - name: Upload Fedora RPM candidate
        uses: actions/upload-artifact@v4
        with:
          name: PicLens-Qt-Fedora-44
          if-no-files-found: error
          path: build/fedora/*.rpm
